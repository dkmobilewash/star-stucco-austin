<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" role="img" aria-label="Diagram showing the five layers of an EIFS wall system" font-family="Inter, Arial, sans-serif">
  <rect width="800" height="920" fill="#f8fafc"/>
  <text x="400" y="48" text-anchor="middle" font-size="32" font-weight="700" fill="#0f172a">EIFS Wall System</text>
  <text x="400" y="78" text-anchor="middle" font-size="18" fill="#475569">Five integrated layers, from the wall outward</text>

  <!-- Layer 1: Substrate -->
  <g>
    <rect x="60" y="110" width="680" height="140" rx="16" fill="#334155"/>
    <circle cx="130" cy="180" r="34" fill="#ffffff"/>
    <text x="130" y="192" text-anchor="middle" font-size="32" font-weight="700" fill="#334155">1</text>
    <text x="190" y="172" font-size="28" font-weight="700" fill="#ffffff">Substrate</text>
    <text x="190" y="206" font-size="18" fill="#e2e8f0">Wall sheathing — glass mat or exterior gypsum board</text>
  </g>

  <!-- Layer 2: Adhesive / Attachment -->
  <g>
    <rect x="60" y="270" width="680" height="140" rx="16" fill="#64748b"/>
    <circle cx="130" cy="340" r="34" fill="#ffffff"/>
    <text x="130" y="352" text-anchor="middle" font-size="32" font-weight="700" fill="#64748b">2</text>
    <text x="190" y="332" font-size="28" font-weight="700" fill="#ffffff">Adhesive or Mechanical Attachment</text>
    <text x="190" y="366" font-size="18" fill="#f1f5f9">Secures the insulation board to the substrate</text>
  </g>

  <!-- Layer 3: EPS Insulation Board -->
  <g>
    <rect x="60" y="430" width="680" height="140" rx="16" fill="#facc15"/>
    <circle cx="130" cy="500" r="34" fill="#ffffff"/>
    <text x="130" y="512" text-anchor="middle" font-size="32" font-weight="700" fill="#a16207">3</text>
    <text x="190" y="492" font-size="28" font-weight="700" fill="#422006">EPS Insulation Board</text>
    <text x="190" y="526" font-size="18" fill="#5b3d0a">Continuous foam core — the energy-efficiency layer</text>
  </g>

  <!-- Layer 4: Base Coat + Mesh -->
  <g>
    <rect x="60" y="590" width="680" height="140" rx="16" fill="#059669"/>
    <circle cx="130" cy="660" r="34" fill="#ffffff"/>
    <text x="130" y="672" text-anchor="middle" font-size="32" font-weight="700" fill="#059669">4</text>
    <text x="190" y="652" font-size="28" font-weight="700" fill="#ffffff">Base Coat &amp; Reinforcing Mesh</text>
    <text x="190" y="686" font-size="18" fill="#d1fae5">Polymer cement with embedded fiberglass mesh</text>
  </g>

  <!-- Layer 5: Finish Coat -->
  <g>
    <rect x="60" y="750" width="680" height="140" rx="16" fill="#047857"/>
    <circle cx="130" cy="820" r="34" fill="#ffffff"/>
    <text x="130" y="832" text-anchor="middle" font-size="32" font-weight="700" fill="#047857">5</text>
    <text x="190" y="812" font-size="28" font-weight="700" fill="#ffffff">Finish Coat</text>
    <text x="190" y="846" font-size="18" fill="#d1fae5">Textured acrylic topcoat — hundreds of colors</text>
  </g>
</svg>
